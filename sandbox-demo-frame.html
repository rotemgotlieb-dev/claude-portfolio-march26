<!DOCTYPE html>
<html lang="en">
<head>
  <!-- TODO 2026-05-21: throwaway validation page for .demo-frame system.
       Delete after .demo-frame ships into real case studies. -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Demo Frame Sandbox</title>
  <link rel="preconnect" href="https://api.fontshare.com">
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=96">
  <style>
    .sandbox-stage {
      max-width: 1100px;
      margin: 0 auto;
      padding: 64px 20px;
      display: flex;
      flex-direction: column;
      gap: 48px;
    }
    .sandbox-heading {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-primary);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }
    .sandbox-subheading {
      font-size: 13px;
      color: var(--text-faint);
      font-family: ui-monospace, 'SF Mono', Menlo, monospace;
    }
    .sandbox-placeholder {
      width: 100%;
      height: 100%;
      background: #F2F1EE;
    }
    .reset-icon {
      width: 16px;
      height: 16px;
      stroke: #FAFAF8;
      stroke-width: 2;
      fill: none;
    }
  </style>
</head>
<body>
  <main class="sandbox-stage">

    <header>
      <div class="sandbox-heading">.demo-frame sandbox</div>
      <div class="sandbox-subheading">2026-05-21 — three instances, no nav, no sitemap</div>
    </header>

    <!-- Instance A: video child + caption. Verifies <video> renders inside the frame
         and the existing .reveal:has(video) cascade exemption holds through the new
         nesting level. -->
    <div>
      <div class="demo-frame">
        <div class="demo-frame-chrome">
          <div class="demo-frame-traffic-lights">
            <span></span><span></span><span></span>
          </div>
          <div class="demo-frame-url">pulse.rotemgotlieb.com</div>
        </div>
        <div class="demo-frame-body">
          <video
            src="img/pulse/v2/videos/bento-thumbnail-v2.mp4"
            poster="img/pulse/v2/videos/bento-thumbnail-v2-poster.jpg"
            autoplay
            muted
            loop
            playsinline
            preload="metadata"
            aria-label="Sandbox validation video — Pulse bento thumbnail loop, mechanical test only">
          </video>
        </div>
      </div>
      <p class="demo-frame-caption">Mechanical test only — final case study videos will be re-shot at higher polish.</p>
    </div>

    <!-- Instance B: placeholder colored div + visible reset button + caption.
         Reset button is disabled in sandbox (visual slot validation only). -->
    <div>
      <div class="demo-frame">
        <div class="demo-frame-chrome">
          <div class="demo-frame-traffic-lights">
            <span></span><span></span><span></span>
          </div>
          <div class="demo-frame-url">ghost.rotemgotlieb.com</div>
        </div>
        <div class="demo-frame-body">
          <div class="sandbox-placeholder"></div>
          <button type="button" class="demo-frame-reset" disabled style="cursor: not-allowed; opacity: 0.85;" aria-label="Reset demo (disabled in sandbox)">
            <svg class="reset-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M3 12a9 9 0 0 1 15.5-6.4M21 4v6h-6"></path>
              <path d="M21 12a9 9 0 0 1-15.5 6.4M3 20v-6h6"></path>
            </svg>
          </button>
        </div>
      </div>
      <p class="demo-frame-caption">Live interactive embed placeholder.</p>
    </div>

    <!-- Instance C: placeholder colored div, NO reset, NO caption.
         Confirms both surfaces are opt-in (not bleeding in by default). -->
    <div>
      <div class="demo-frame">
        <div class="demo-frame-chrome">
          <div class="demo-frame-traffic-lights">
            <span></span><span></span><span></span>
          </div>
          <div class="demo-frame-url">demo.rotemgotlieb.com</div>
        </div>
        <div class="demo-frame-body">
          <div class="sandbox-placeholder"></div>
        </div>
      </div>
    </div>

  </main>
  <script src="main.js?v=23"></script>
</body>
</html>
