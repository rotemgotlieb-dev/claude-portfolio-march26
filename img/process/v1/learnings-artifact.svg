  <!-- # Session: Pulse V2 Integration -->
  <text class="md-h1" x="125" y="177">
    <tspan class="md-syntax">#</tspan>
    <tspan> Session: Pulse V2 Integration</tspan>
  </text>

  <!-- **Date:** 2026-04-27 -->
  <text class="md" x="125" y="232">
    <tspan class="md-syntax">**</tspan><tspan class="md-bold">Date:</tspan><tspan class="md-syntax">**</tspan><tspan> 2026-04-27</tspan>
  </text>

  <!-- **Duration:** ~3 hours -->
  <text class="md" x="125" y="261">
    <tspan class="md-syntax">**</tspan><tspan class="md-bold">Duration:</tspan><tspan class="md-syntax">**</tspan><tspan> ~3 hours</tspan>
  </text>

  <!-- ## What worked -->
  <text class="md-h2" x="125" y="315">
    <tspan class="md-syntax">##</tspan>
    <tspan> What worked</tspan>
  </text>

  <!-- - Diptych pattern (.case-image-diptych) introduced for V1/V2 visual -->
  <text class="md" x="125" y="351">
    <tspan class="md-bullet">-</tspan>
    <tspan> Diptych pattern (</tspan><tspan class="md-code">.case-image-diptych</tspan><tspan>) introduced for V1/V2 visual</tspan>
  </text>
  <text class="md" x="125" y="377">
    <tspan>  identity pivot. </tspan><tspan class="md-code">1fr/2fr</tspan><tspan> columns with </tspan><tspan class="md-code">align-items: start</tspan><tspan> (was </tspan><tspan class="md-code">stretch</tspan><tspan> —</tspan>
  </text>
  <text class="md" x="125" y="404">
    <tspan>  caused V1 crop, fixed in followup session)</tspan>
  </text>

  <!-- - Bento card swapped from <img> to <video> ... -->
  <text class="md" x="125" y="437">
    <tspan class="md-bullet">-</tspan>
    <tspan> Bento card swapped from </tspan><tspan class="md-code">&lt;img&gt;</tspan><tspan> to </tspan><tspan class="md-code">&lt;video&gt;</tspan><tspan> using </tspan><tspan class="md-code">ffmpeg</tspan><tspan>-clipped</tspan>
  </text>
  <text class="md" x="125" y="464">
    <tspan>  </tspan><tspan class="md-code">morph.mov</tspan><tspan> segment</tspan>
  </text>

  <!-- ## What broke -->
  <text class="md-h2" x="125" y="515">
    <tspan class="md-syntax">##</tspan>
    <tspan> What broke</tspan>
  </text>

  <text class="md" x="125" y="551">
    <tspan class="md-bullet">-</tspan>
    <tspan> </tspan><tspan class="md-code">align-items: stretch</tspan><tspan> beat </tspan><tspan class="md-code">aspect-ratio</tspan><tspan> in CSS Grid. V1 image cropped</tspan>
  </text>
  <text class="md" x="125" y="577">
    <tspan>  to portrait inside </tspan><tspan class="md-code">1fr</tspan><tspan> column. Fix: </tspan><tspan class="md-code">align-items: start</tspan><tspan> on parent.</tspan>
  </text>

  <!-- ## Standing rule added -->
  <text class="md-h2" x="125" y="635">
    <tspan class="md-syntax">##</tspan>
    <tspan> Standing rule added</tspan>
  </text>

  <text class="md" x="125" y="671">
    <tspan class="md-bullet">-</tspan>
    <tspan> When grid children declare </tspan><tspan class="md-code">aspect-ratio</tspan><tspan>, parent must use</tspan>
  </text>
  <text class="md" x="125" y="697">
    <tspan>  </tspan><tspan class="md-code">align-items: start</tspan><tspan> (or </tspan><tspan class="md-code">center</tspan><tspan>) — </tspan><tspan class="md-code">stretch</tspan><tspan> overrides </tspan><tspan class="md-code">aspect-ratio</tspan>
  </text>
  <text class="md" x="125" y="724">
    <tspan>  silently.</tspan>
  </text>

