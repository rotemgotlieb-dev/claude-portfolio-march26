<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pulse Bento Thumbnail — Sandbox</title>

  <!-- Load full site styles so .thumb-pulse background tint + Pulse Bento
       Thumbnail block (pbt-*) match production verbatim. -->
  <link rel="stylesheet" href="styles.css">

  <style>
    /* Sandbox-only chrome. Centers the 16:9 thumbnail at a stable
       1280x720 footprint for clean Playwright capture. NOT shipped
       to production — production styles live in styles.css under the
       Pulse Bento Thumbnail block. */
    html, body {
      margin: 0;
      padding: 0;
      background: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Satoshi', system-ui, sans-serif;
    }
    .sandbox-frame {
      width: 1280px;
      height: 720px;
      max-width: 100vw;
      max-height: 100vh;
      box-shadow: 0 0 60px rgba(0, 0, 0, 0.6);
      position: relative;
      overflow: hidden;
    }
    /* Force the thumbnail container to fill the sandbox frame so
       Playwright captures the exact 16:9 thumbnail content with no
       letterboxing. The .bento-card-thumb production sizing rule
       (aspect-ratio: 16/9 + width: 100%) handles this naturally. */
    .sandbox-frame .bento-card-thumb {
      width: 100%;
      height: 100%;
      aspect-ratio: auto;
    }
  </style>
</head>
<body>

  <div class="sandbox-frame">
    <div class="bento-card-thumb thumb-pulse" id="pulseBentoThumb">
      <div class="pbt-stage">

        <!-- Single warm-orange thermal blob. SVG <circle> per the
             SVG primitive rule (circles use r, ellipses use rx/ry).
             The r attribute is CSS-animated via @keyframes pbt-breathe.
             The fill is a radialGradient whose first stop hue shifts
             slightly on a separate @keyframes cycle for organic warmth. -->
        <svg class="pbt-blob" viewBox="0 0 400 400" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
          <defs>
            <radialGradient id="pbtBlobGrad" cx="50%" cy="50%" r="50%">
              <stop class="pbt-stop-core"   offset="0%"   stop-color="#ff7a2c" stop-opacity="0.82"/>
              <stop class="pbt-stop-mid"    offset="45%"  stop-color="#ff8a3c" stop-opacity="0.42"/>
              <stop class="pbt-stop-edge"   offset="100%" stop-color="#ff8a3c" stop-opacity="0"/>
            </radialGradient>
          </defs>
          <circle class="pbt-blob-circle" cx="200" cy="200" r="120" fill="url(#pbtBlobGrad)"/>
        </svg>

      </div>
    </div>
  </div>

  <!-- Load the thumbnail module. Relative path because sandbox file
       sits at project root alongside index.html. -->
  <script type="module" src="js/demos/pulse-bento-thumbnail.js"></script>
</body>
</html>
