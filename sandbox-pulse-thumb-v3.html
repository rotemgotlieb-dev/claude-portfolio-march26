<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pulse Living Observatory thumbnail · v3 sandbox</title>
<meta name="viewport" content="width=1280, initial-scale=1">
<link rel="stylesheet" href="styles.css">
<style>
  /* sandbox-only chrome */
  html, body { margin: 0; padding: 0; background: #FAFAF8; font-family: 'Satoshi', system-ui, sans-serif; }
  .sandbox-shell { display: grid; grid-template-columns: 1fr 1fr; gap: 64px; padding: 64px; max-width: 1280px; margin: 0 auto; align-items: start; }
  .sandbox-cell h2 { margin: 0 0 12px; font-size: 13px; font-weight: 500; color: #888; letter-spacing: 0.04em; text-transform: lowercase; }
  .sandbox-cell .bento-card-thumb { border-radius: 12px; }
  .small-cell .bento-card-thumb { max-width: 480px; }
</style>
</head>
<body>
<div class="sandbox-shell">

  <!-- Bento-scale rendition (large, ~520px wide as on homepage) -->
  <div class="sandbox-cell large-cell">
    <h2>bento (homepage scale)</h2>
    <div class="bento-card-thumb thumb-pulse" style="aspect-ratio: 16/9;">
      <!-- BEGIN inner markup -->
      <div class="plo-stage" data-pulse-thumb aria-hidden="true">
        <div class="plo-bar"></div>

        <div class="plo-grid">
          <div class="plo-col">
            <span class="plo-col-header"></span>
            <div class="plo-task"><span class="plo-task-bar" style="width:78%"></span></div>
            <div class="plo-task"><span class="plo-task-bar" style="width:62%"></span></div>
          </div>
          <div class="plo-col">
            <span class="plo-col-header"></span>
            <div class="plo-task plo-task--hot"><span class="plo-task-bar" style="width:84%"></span></div>
            <div class="plo-task"><span class="plo-task-bar" style="width:70%"></span></div>
            <div class="plo-task"><span class="plo-task-bar" style="width:55%"></span></div>
          </div>
          <div class="plo-col">
            <span class="plo-col-header"></span>
            <div class="plo-task"><span class="plo-task-bar" style="width:72%"></span></div>
            <div class="plo-task"><span class="plo-task-bar" style="width:60%"></span></div>
          </div>
          <div class="plo-col">
            <span class="plo-col-header"></span>
            <div class="plo-task"><span class="plo-task-bar" style="width:65%"></span></div>
            <div class="plo-task"><span class="plo-task-bar" style="width:80%"></span></div>
            <div class="plo-task"><span class="plo-task-bar" style="width:50%"></span></div>
          </div>
        </div>

        <svg class="plo-friction" viewBox="0 0 400 225" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
          <defs>
            <radialGradient id="ploFrictionGrad" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stop-color="#ff7a2c" stop-opacity="0.55"/>
              <stop offset="55%" stop-color="#ff9a4c" stop-opacity="0.25"/>
              <stop offset="100%" stop-color="#ff9a4c" stop-opacity="0"/>
            </radialGradient>
          </defs>
          <circle cx="170" cy="118" r="62" fill="url(#ploFrictionGrad)"/>
          <circle cx="190" cy="100" r="44" fill="url(#ploFrictionGrad)"/>
          <circle cx="156" cy="132" r="38" fill="url(#ploFrictionGrad)"/>
        </svg>

        <svg class="plo-rage" viewBox="0 0 400 225" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
          <defs>
            <radialGradient id="ploRageGrad" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stop-color="#e03d2a" stop-opacity="0.78"/>
              <stop offset="60%" stop-color="#e85540" stop-opacity="0.32"/>
              <stop offset="100%" stop-color="#e85540" stop-opacity="0"/>
            </radialGradient>
          </defs>
          <circle class="plo-rage-blob plo-rage-blob--center" cx="178" cy="116" r="26" fill="url(#ploRageGrad)"/>
          <circle class="plo-rage-blob plo-rage-blob--left"   cx="152" cy="132" r="20" fill="url(#ploRageGrad)"/>
          <circle class="plo-rage-blob plo-rage-blob--top"    cx="198" cy="98"  r="17" fill="url(#ploRageGrad)"/>
        </svg>

        <div class="plo-scrubber">
          <span class="plo-scrubber-track"></span>
          <span class="plo-scrubber-handle"></span>
        </div>

        <div class="plo-cursor" aria-hidden="true">
          <svg viewBox="0 0 16 16" width="16" height="16">
            <path d="M2 1.5 L13.5 8.4 L8.2 9.2 L11 14.4 L8.7 15.6 L5.9 10.4 L2 13.6 Z"
                  fill="#1f1d1a" stroke="#fafaf8" stroke-width="0.6" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>
      <!-- END inner markup -->
    </div>
  </div>

  <!-- Other Work scale rendition (smaller, ~480px wide) -->
  <div class="sandbox-cell small-cell">
    <h2>other work (case-study scale)</h2>
    <div class="bento-card-thumb thumb-pulse" style="aspect-ratio: 16/9;">
      <div class="plo-stage" data-pulse-thumb aria-hidden="true">
        <div class="plo-bar"></div>

        <div class="plo-grid">
          <div class="plo-col">
            <span class="plo-col-header"></span>
            <div class="plo-task"><span class="plo-task-bar" style="width:78%"></span></div>
            <div class="plo-task"><span class="plo-task-bar" style="width:62%"></span></div>
          </div>
          <div class="plo-col">
            <span class="plo-col-header"></span>
            <div class="plo-task plo-task--hot"><span class="plo-task-bar" style="width:84%"></span></div>
            <div class="plo-task"><span class="plo-task-bar" style="width:70%"></span></div>
            <div class="plo-task"><span class="plo-task-bar" style="width:55%"></span></div>
          </div>
          <div class="plo-col">
            <span class="plo-col-header"></span>
            <div class="plo-task"><span class="plo-task-bar" style="width:72%"></span></div>
            <div class="plo-task"><span class="plo-task-bar" style="width:60%"></span></div>
          </div>
          <div class="plo-col">
            <span class="plo-col-header"></span>
            <div class="plo-task"><span class="plo-task-bar" style="width:65%"></span></div>
            <div class="plo-task"><span class="plo-task-bar" style="width:80%"></span></div>
            <div class="plo-task"><span class="plo-task-bar" style="width:50%"></span></div>
          </div>
        </div>

        <svg class="plo-friction" viewBox="0 0 400 225" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
          <defs>
            <radialGradient id="ploFrictionGrad2" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stop-color="#ff7a2c" stop-opacity="0.55"/>
              <stop offset="55%" stop-color="#ff9a4c" stop-opacity="0.25"/>
              <stop offset="100%" stop-color="#ff9a4c" stop-opacity="0"/>
            </radialGradient>
          </defs>
          <circle cx="170" cy="118" r="62" fill="url(#ploFrictionGrad2)"/>
          <circle cx="190" cy="100" r="44" fill="url(#ploFrictionGrad2)"/>
          <circle cx="156" cy="132" r="38" fill="url(#ploFrictionGrad2)"/>
        </svg>

        <svg class="plo-rage" viewBox="0 0 400 225" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
          <defs>
            <radialGradient id="ploRageGrad2" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stop-color="#e03d2a" stop-opacity="0.78"/>
              <stop offset="60%" stop-color="#e85540" stop-opacity="0.32"/>
              <stop offset="100%" stop-color="#e85540" stop-opacity="0"/>
            </radialGradient>
          </defs>
          <circle class="plo-rage-blob plo-rage-blob--center" cx="178" cy="116" r="26" fill="url(#ploRageGrad2)"/>
          <circle class="plo-rage-blob plo-rage-blob--left"   cx="152" cy="132" r="20" fill="url(#ploRageGrad2)"/>
          <circle class="plo-rage-blob plo-rage-blob--top"    cx="198" cy="98"  r="17" fill="url(#ploRageGrad2)"/>
        </svg>

        <div class="plo-scrubber">
          <span class="plo-scrubber-track"></span>
          <span class="plo-scrubber-handle"></span>
        </div>

        <div class="plo-cursor" aria-hidden="true">
          <svg viewBox="0 0 16 16" width="16" height="16">
            <path d="M2 1.5 L13.5 8.4 L8.2 9.2 L11 14.4 L8.7 15.6 L5.9 10.4 L2 13.6 Z"
                  fill="#1f1d1a" stroke="#fafaf8" stroke-width="0.6" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>
    </div>
  </div>

</div>

<script type="module" src="js/demos/pulse-thumb-v3.js"></script>
</body>
</html>
